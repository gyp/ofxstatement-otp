name: CI

on:
  pull_request:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: pip install -e .[dev]
      - run: black --check setup.py src tests
      - run: pytest
      - run: mypy src tests
